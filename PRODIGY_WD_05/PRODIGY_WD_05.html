<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOHIT | Neo Weather App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      radial-gradient(circle at top left,#38bdf855,transparent 30%),
      radial-gradient(circle at bottom right,#8b5cf655,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
      overflow:hidden;
      color:white;
      position:relative;
    }

    /* Animated Background */

    .bg-circle1{
      position:absolute;
      width:500px;
      height:500px;
      background:#38bdf822;
      border-radius:50%;
      top:-200px;
      left:-150px;
      filter:blur(20px);
      animation:float 6s ease-in-out infinite;
    }

    .bg-circle2{
      position:absolute;
      width:400px;
      height:400px;
      background:#8b5cf622;
      border-radius:50%;
      bottom:-150px;
      right:-100px;
      filter:blur(20px);
      animation:float 8s ease-in-out infinite;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(20px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* Weather Card */

    .weather-container{
      width:420px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      box-shadow:0 0 30px rgba(0,0,0,0.4);
      text-align:center;
      z-index:1;
      animation:fadeIn 1.5s ease;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .weather-container h1{
      font-size:42px;
      margin-bottom:10px;
      color:#ffffff;
    }

    .weather-container p{
      color:#cbd5e1;
      margin-bottom:25px;
    }

    /* Search Box */

    .search-box{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    .search-box input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:15px;
      outline:none;
      font-size:16px;
      background:#ffffffdd;
    }

    .search-box button{
      padding:14px 20px;
      border:none;
      border-radius:15px;
      background:#38bdf8;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .search-box button:hover{
      background:white;
      transform:scale(1.05);
    }

    /* Weather Result */

    .weather-box{
      margin-top:20px;
      padding:25px;
      border-radius:20px;
      background:rgba(255,255,255,0.06);
    }

    .weather-icon{
      font-size:70px;
      margin-bottom:15px;
    }

    .temp{
      font-size:50px;
      font-weight:bold;
      color:#38bdf8;
    }

    .city{
      font-size:28px;
      margin-top:10px;
    }

    .condition{
      font-size:20px;
      color:#e2e8f0;
      margin-top:10px;
    }

    /* Details */

    .details{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      margin-top:25px;
    }

    .detail-card{
      background:rgba(255,255,255,0.08);
      padding:18px;
      border-radius:18px;
      transition:0.3s;
    }

    .detail-card:hover{
      background:#2563eb;
      transform:translateY(-5px);
    }

    .detail-card h3{
      margin-bottom:10px;
      color:#38bdf8;
    }

    footer{
      margin-top:25px;
      color:#94a3b8;
      font-size:14px;
    }

    /* Mobile */

    @media(max-width:500px){

      .weather-container{
        width:92%;
        padding:25px;
      }

      .search-box{
        flex-direction:column;
      }

      .details{
        grid-template-columns:1fr;
      }

      .temp{
        font-size:40px;
      }
    }

  </style>
</head>

<body>

  <!-- Background -->

  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>

  <!-- Weather App -->

  <div class="weather-container">

    <h1>Neo Weather</h1>

    <p>Modern Weather App by P MOHIT SAI</p>

    <!-- Search -->

    <div class="search-box">

      <input 
      type="text" 
      id="cityInput"
      placeholder="Enter city name">

      <button onclick="getWeather()">
        Search
      </button>

    </div>

    <!-- Weather Display -->

    <div class="weather-box">

      <div class="weather-icon" id="icon">
        ☀️
      </div>

      <div class="temp" id="temp">
        28°C
      </div>

      <div class="city" id="city">
        Hyderabad
      </div>

      <div class="condition" id="condition">
        Clear Sky
      </div>

      <!-- Details -->

      <div class="details">

        <div class="detail-card">

          <h3>Humidity</h3>

          <p id="humidity">60%</p>

        </div>

        <div class="detail-card">

          <h3>Wind</h3>

          <p id="wind">12 km/h</p>

        </div>

      </div>

    </div>

    <footer>
      © 2026 Neo Weather App | Designed by P MOHIT SAI
    </footer>

  </div>

  <!-- JavaScript -->

  <script>

    async function getWeather(){

      const city = document.getElementById("cityInput").value;

      if(city === ""){

        alert("Please enter a city name");
        return;
      }

      // OpenWeather API

      const apiKey = "YOUR_API_KEY";

      const url =
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

      try{

        const response = await fetch(url);

        const data = await response.json();

        // Update UI

        document.getElementById("temp").innerText =
        Math.round(data.main.temp) + "°C";

        document.getElementById("city").innerText =
        data.name;

        document.getElementById("condition").innerText =
        data.weather[0].description;

        document.getElementById("humidity").innerText =
        data.main.humidity + "%";

        document.getElementById("wind").innerText =
        data.wind.speed + " km/h";

        // Weather Emoji

        let weatherMain = data.weather[0].main;

        if(weatherMain == "Clouds"){
          document.getElementById("icon").innerText = "☁️";
        }

        else if(weatherMain == "Rain"){
          document.getElementById("icon").innerText = "🌧️";
        }

        else if(weatherMain == "Thunderstorm"){
          document.getElementById("icon").innerText = "⛈️";
        }

        else if(weatherMain == "Snow"){
          document.getElementById("icon").innerText = "❄️";
        }

        else{
          document.getElementById("icon").innerText = "☀️";
        }

      }

      catch(error){

        alert("City not found!");

      }

    }

  </script>

</body>
</html>
